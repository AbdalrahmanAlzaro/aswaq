<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_preview.css">
<title>Components · toast & banner</title>
<style>
  .toast { display: inline-flex; align-items: center; gap: 12px; padding: 12px 18px 12px 14px; border-radius: 16px; background: var(--charcoal-600); color: var(--cream-100); font-family: var(--font-body); font-size: 14px; box-shadow: var(--shadow-lg); }
  .toast .icon { width: 24px; height: 24px; border-radius: 999px; display: grid; place-items: center; flex: none; }
  .toast.success .icon { background: var(--olive-300); color: var(--charcoal-700); }
  .toast.error   .icon { background: var(--pom-300);   color: #fff; }
  .toast.info    .icon { background: var(--gold-300);  color: var(--charcoal-700); }
  .toast button.x { background: transparent; border: 0; color: var(--cream-300); cursor: pointer; font-size: 14px; margin-left: 4px; }
  .banner { display: flex; align-items: center; gap: 12px; padding: 14px 18px; border-radius: 16px; font-family: var(--font-body); font-size: 14px; }
  .banner.warn { background: var(--gold-soft-bg); color: var(--gold-600); border: 1px solid var(--gold-200); }
  .banner.min { background: var(--surface-tint); color: var(--accent-press); border: 1px solid var(--terracotta-200); }
</style>
</head>
<body>
<div class="card tight">
  <div class="spread"><span class="eyebrow">Toast · banner · inline messages</span><span class="mono">3s autodismiss · charcoal substrate</span></div>
  <div class="col" style="gap: 10px;">
    <div class="toast success"><span class="icon"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M5 12l5 5 9-10" stroke-linecap="round" stroke-linejoin="round"/></svg></span><span>Saved to your favourites</span><button class="x">Undo</button></div>
    <div class="toast info"><span class="icon"><svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="12" r="10"/></svg></span><span>Order placed — pickup ready in 25 minutes</span></div>
    <div class="toast error"><span class="icon"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M6 6l12 12M18 6L6 18" stroke-linecap="round"/></svg></span><span>Payment failed — try a different card</span></div>
  </div>
  <div class="col" style="gap: 10px;">
    <div class="banner min">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 8v5M12 16v.5" stroke-linecap="round"/></svg>
      Add <b>7 JD</b> more from Habibah Sweets to reach the 25 JD minimum.
    </div>
    <div class="banner warn">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M3 7 L7 11 L12 5 L17 11 L21 7 L19 18 H5 Z"/></svg>
      Comparison for luxury items is a Premium feature.
    </div>
  </div>
</div>
</body></html>
