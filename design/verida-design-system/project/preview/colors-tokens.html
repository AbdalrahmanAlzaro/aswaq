<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_preview.css">
<title>Colors · tokens in use</title></head>
<body>
<div class="card tight">
  <div class="spread">
    <span class="eyebrow">Semantic tokens · resolved</span>
    <span class="mono">colors_and_type.css</span>
  </div>
  <div class="row" style="gap: 10px;">
    <div style="flex:1; padding:18px; border-radius:14px; background:var(--bg); border:1px solid var(--border);">
      <div class="mono" style="font-size:10.5px;">--bg</div>
      <div style="height:8px;"></div>
      <div style="font-family:var(--font-display); font-size:22px; color:var(--fg-1); font-weight:600;">Almond date pastry</div>
      <div class="mono" style="font-size:11px; color:var(--fg-3);">--fg-1 · --fg-3</div>
    </div>
    <div style="flex:1; padding:18px; border-radius:14px; background:var(--surface); border:1px solid var(--border);">
      <div class="mono" style="font-size:10.5px;">--surface</div>
      <div style="height:8px;"></div>
      <div style="font-family:var(--font-display); font-size:22px; color:var(--fg-1); font-weight:600;">Card on white</div>
      <div class="mono" style="font-size:11px; color:var(--fg-2);">--fg-2</div>
    </div>
    <div style="flex:1; padding:18px; border-radius:14px; background:var(--bg-inverse); border:1px solid var(--bg-inverse);">
      <div class="mono" style="font-size:10.5px; color:var(--cream-200);">--bg-inverse</div>
      <div style="height:8px;"></div>
      <div style="font-family:var(--font-display); font-size:22px; color:var(--fg-inverse); font-weight:600;">Aswaq Premium</div>
      <div class="mono" style="font-size:11px; color:var(--gold-300);">--gold-400 on ink</div>
    </div>
  </div>
  <div class="row tight">
    <span style="padding:6px 12px; border-radius:999px; background:var(--accent); color:var(--accent-fg); font-size:12px; font-weight:600;">--accent</span>
    <span style="padding:6px 12px; border-radius:999px; background:var(--success-soft-bg); color:var(--success); font-size:12px; font-weight:600;">--success</span>
    <span style="padding:6px 12px; border-radius:999px; background:var(--danger-soft-bg); color:var(--danger); font-size:12px; font-weight:600;">--danger</span>
    <span style="padding:6px 12px; border-radius:999px; background:var(--gold-soft-bg); color:var(--gold-600); font-size:12px; font-weight:600;">--gold</span>
    <span style="padding:6px 12px; border-radius:999px; background:var(--surface-tint); color:var(--accent); font-size:12px; font-weight:600;">--surface-tint</span>
  </div>
</div>
</body></html>
