<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_preview.css">
<title>Components · buttons</title>
<style>
  .btn { font-family: var(--font-body); font-weight: 600; font-size: 14px; border: 0; cursor: pointer; padding: 12px 20px; border-radius: 14px; transition: all 140ms var(--ease-out); display: inline-flex; align-items: center; gap: 8px; }
  .btn-primary { background: var(--accent); color: var(--accent-fg); box-shadow: var(--shadow-xs); }
  .btn-secondary { background: transparent; color: var(--fg-1); border: 1px solid var(--border-strong); }
  .btn-ghost { background: transparent; color: var(--accent); }
  .btn-ink { background: var(--charcoal-600); color: var(--cream-50); }
  .btn-gold { background: var(--gold-400); color: var(--charcoal-700); }
  .btn-danger { background: transparent; color: var(--danger); border: 1px solid var(--pom-300); }
  .btn-sm { padding: 8px 14px; font-size: 13px; border-radius: 10px; }
  .btn-lg { padding: 16px 28px; font-size: 16px; border-radius: 16px; }
  .btn:disabled, .btn[disabled] { opacity: 0.5; cursor: not-allowed; }
  .focus { box-shadow: var(--shadow-focus); }
</style>
</head>
<body>
<div class="card tight">
  <div class="spread">
    <span class="eyebrow">Buttons · variants × states</span>
    <span class="mono">.btn-primary · -secondary · -ghost · -ink · -gold · -danger</span>
  </div>
  <div class="row" style="gap: 10px;">
    <button class="btn btn-primary">Save business</button>
    <button class="btn btn-primary focus">Save business</button>
    <button class="btn btn-primary" style="background: var(--accent-press);">Save business</button>
    <button class="btn btn-primary" disabled>Save business</button>
  </div>
  <div class="row" style="gap: 10px;">
    <button class="btn btn-secondary">Add to cart</button>
    <button class="btn btn-ghost">View profile</button>
    <button class="btn btn-ink">Become a seller</button>
    <button class="btn btn-gold">Go Premium</button>
    <button class="btn btn-danger">Remove</button>
  </div>
  <div class="row" style="gap: 10px;">
    <button class="btn btn-primary btn-sm">Save</button>
    <button class="btn btn-primary">Save</button>
    <button class="btn btn-primary btn-lg">Place order · 38 JD</button>
  </div>
</div>
</body></html>
