<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_preview.css">
<title>Colors · semantic</title></head>
<body>
<div class="card tight">
  <div class="spread">
    <span class="eyebrow">Semantic — Olive · Pomegranate</span>
    <span class="mono">success · danger</span>
  </div>
  <div class="row" style="gap:8px; flex-wrap:nowrap;">
    <div class="swatch light" style="background:var(--olive-100); flex:1; height:88px;"><span class="name" style="color:var(--olive-700)">olive-100</span></div>
    <div class="swatch" style="background:var(--olive-300); flex:1; height:88px;"><span class="name">olive-300</span></div>
    <div class="swatch" style="background:var(--olive-500); flex:1; height:88px;"><span class="name">olive-500 · open</span></div>
    <div class="swatch" style="background:var(--olive-700); flex:1; height:88px;"><span class="name">olive-700</span></div>
    <div style="width:12px;"></div>
    <div class="swatch light" style="background:var(--pom-100); flex:1; height:88px;"><span class="name" style="color:var(--pom-700)">pom-100</span></div>
    <div class="swatch" style="background:var(--pom-300); flex:1; height:88px;"><span class="name">pom-300</span></div>
    <div class="swatch" style="background:var(--pom-500); flex:1; height:88px;"><span class="name">pom-500 · closed</span></div>
    <div class="swatch" style="background:var(--pom-700); flex:1; height:88px;"><span class="name">pom-700</span></div>
  </div>
  <div class="mono" style="font-size: 11px;">Stays in the warm family — no Material green, no iOS red.</div>
</div>
</body></html>
