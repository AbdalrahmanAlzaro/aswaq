<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_preview.css">
<title>Colors · gold</title></head>
<body>
<div class="card tight">
  <div class="spread">
    <span class="eyebrow">Gold — Status accent</span>
    <span class="mono">--gold-{50…600}</span>
  </div>
  <div class="row" style="gap:8px; flex-wrap:nowrap;">
    <div class="swatch light" style="background:var(--gold-50);  flex:1; height:96px;"><span class="name" style="color:var(--charcoal-500)">50 · soft bg</span></div>
    <div class="swatch light" style="background:var(--gold-100); flex:1; height:96px;"><span class="name" style="color:var(--charcoal-500)">100</span></div>
    <div class="swatch light" style="background:var(--gold-200); flex:1; height:96px;"><span class="name" style="color:var(--charcoal-500)">200</span></div>
    <div class="swatch" style="background:var(--gold-300); flex:1; height:96px;"><span class="name">300</span></div>
    <div class="swatch" style="background:var(--gold-400); flex:1.2; height:96px; outline:2px solid var(--gold-600); outline-offset:2px;"><span class="name">400 · premium</span></div>
    <div class="swatch" style="background:var(--gold-500); flex:1; height:96px;"><span class="name">500</span></div>
    <div class="swatch" style="background:var(--gold-600); flex:1; height:96px;"><span class="name">600</span></div>
  </div>
  <div class="mono" style="font-size: 11px;">Stars · verified seal · premium ring · luxury chip. Never a CTA.</div>
</div>
</body></html>
