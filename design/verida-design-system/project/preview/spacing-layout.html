<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_preview.css">
<title>Spacing · layout grid</title></head>
<body>
<div class="card tight">
  <div class="spread">
    <span class="eyebrow">Layout · mobile gutter + grid</span>
    <span class="mono">20px gutter · 12px gap</span>
  </div>
  <div style="position:relative; background:var(--surface); border-radius:20px; border:1px solid var(--border); padding:24px; height:140px; box-sizing:border-box;">
    <div style="position:absolute; inset:0 0 0 20px; border-left:1px dashed var(--terracotta-300);"></div>
    <div style="position:absolute; inset:0 20px 0 0; border-right:1px dashed var(--terracotta-300);"></div>
    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:12px; height:100%;">
      <div style="background:var(--cream-200); border-radius:14px;"></div>
      <div style="background:var(--cream-200); border-radius:14px;"></div>
    </div>
    <div style="position:absolute; left:24px; top:8px; font-family:var(--font-mono); font-size:10px; color:var(--terracotta-600);">20px gutter</div>
    <div style="position:absolute; left:50%; top:8px; transform:translateX(-50%); font-family:var(--font-mono); font-size:10px; color:var(--terracotta-600);">↔ 12px gap</div>
  </div>
  <div class="mono" style="font-size: 11px;">Mobile: 20px gutter, 12px between cards. Web: max 1200px container, 32px gutters, 24px gap.</div>
</div>
</body></html>
