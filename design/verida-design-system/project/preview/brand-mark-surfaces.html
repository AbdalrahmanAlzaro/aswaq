<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_preview.css">
<title>Brand · mark on surfaces</title></head>
<body>
<div class="card" style="padding: 24px;">
  <div class="row gap-lg" style="justify-content: space-around;">
    <div class="col" style="align-items: center; gap: 10px;">
      <div style="width:96px;height:96px;border-radius:24px;background:var(--cream-100);display:flex;align-items:center;justify-content:center;box-shadow:var(--shadow-sm);">
        <img src="../assets/logo/aswaq-mark.svg" style="height:64px;">
      </div>
      <span class="mono">on cream</span>
    </div>
    <div class="col" style="align-items: center; gap: 10px;">
      <div style="width:96px;height:96px;border-radius:24px;background:var(--charcoal-600);display:flex;align-items:center;justify-content:center;box-shadow:var(--shadow-md);">
        <img src="../assets/logo/aswaq-mark.svg" style="height:64px; filter: brightness(1.15);">
      </div>
      <span class="mono">on charcoal</span>
    </div>
    <div class="col" style="align-items: center; gap: 10px;">
      <div style="width:96px;height:96px;border-radius:24px;background:var(--terracotta-500);display:flex;align-items:center;justify-content:center;box-shadow:var(--shadow-md);">
        <img src="../assets/logo/aswaq-mark.svg" style="height:64px; filter: invert(1) brightness(1.2);">
      </div>
      <span class="mono">on terracotta</span>
    </div>
    <div class="col" style="align-items: center; gap: 10px;">
      <div style="width:96px;height:96px;border-radius:24px;background:#fff;display:flex;align-items:center;justify-content:center;box-shadow:var(--shadow-sm);border:1px solid var(--cream-300);">
        <img src="../assets/logo/aswaq-mark.svg" style="height:64px;">
      </div>
      <span class="mono">on white</span>
    </div>
  </div>
</div>
</body></html>
