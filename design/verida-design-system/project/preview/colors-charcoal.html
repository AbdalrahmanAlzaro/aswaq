<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_preview.css">
<title>Colors · charcoal</title></head>
<body>
<div class="card tight">
  <div class="spread">
    <span class="eyebrow">Charcoal — Ink</span>
    <span class="mono">--charcoal-{50…700}</span>
  </div>
  <div class="row" style="gap:8px; flex-wrap:nowrap;">
    <div class="swatch light" style="background:var(--charcoal-50);  flex:1; height:96px;"><span class="name" style="color:var(--charcoal-500)">50</span></div>
    <div class="swatch light" style="background:var(--charcoal-100); flex:1; height:96px;"><span class="name" style="color:var(--charcoal-500)">100</span></div>
    <div class="swatch" style="background:var(--charcoal-200); flex:1; height:96px;"><span class="name">200 · placeholder</span></div>
    <div class="swatch" style="background:var(--charcoal-300); flex:1; height:96px;"><span class="name">300 · meta</span></div>
    <div class="swatch" style="background:var(--charcoal-400); flex:1; height:96px;"><span class="name">400 · secondary</span></div>
    <div class="swatch" style="background:var(--charcoal-500); flex:1; height:96px;"><span class="name">500</span></div>
    <div class="swatch" style="background:var(--charcoal-600); flex:1.1; height:96px; outline:2px solid var(--gold-400); outline-offset:2px;"><span class="name">600 · ink</span></div>
    <div class="swatch" style="background:var(--charcoal-700); flex:1; height:96px;"><span class="name">700</span></div>
  </div>
  <div class="mono" style="font-size: 11px;">All text uses <b>charcoal-600</b>. Pure #000 is forbidden — it shouts against cream.</div>
</div>
</body></html>
