<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_preview.css">
<title>Components · business card</title>
<style>
  .biz { width: 280px; background: var(--surface); border-radius: 20px; border: 1px solid var(--border); box-shadow: var(--shadow-sm); overflow: hidden; font-family: var(--font-body); position: relative; }
  .biz .img { aspect-ratio: 16/10; background: linear-gradient(135deg, #d06b4b 0%, #8a611b 100%); position: relative; }
  .biz .img.alt { background: linear-gradient(135deg, #756d63 0%, #2b251f 100%); }
  .biz .img.gym { background: linear-gradient(135deg, #444723 0%, #1f1a15 100%); }
  .biz .img::after { content: ""; position: absolute; inset: auto 0 0 0; height: 50%; background: linear-gradient(to top, rgba(31,26,21,.35), transparent); }
  .biz .heart { position: absolute; top: 12px; right: 12px; width: 36px; height: 36px; background: rgba(253, 251, 246, 0.95); border-radius: 999px; display: grid; place-items: center; box-shadow: var(--shadow-sm); }
  .biz .heart svg { width: 18px; height: 18px; }
  .biz .body { padding: 14px 16px 16px; }
  .biz .meta-row { display: flex; gap: 6px; align-items: center; font-size: 12.5px; color: var(--fg-2); }
  .biz .badges { position: absolute; top: 12px; left: 12px; display: flex; gap: 6px; }
  .badge { display: inline-flex; align-items: center; gap: 4px; font-weight: 600; font-size: 11px; padding: 4px 8px; border-radius: 999px; line-height: 1; backdrop-filter: blur(8px); }
  .b-verified { background: rgba(250, 243, 225, .92); color: var(--gold-600); }
  .b-open { background: rgba(230, 231, 200, .92); color: var(--olive-700); }
  .name { font-size: 16px; font-weight: 700; color: var(--fg-1); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .star { color: var(--gold-400); }
  .sep { color: var(--cream-400); }
</style>
</head>
<body>
<div class="card tight" style="background: var(--bg);">
  <div class="spread"><span class="eyebrow">Business card</span><span class="mono">16:10 image · 20px radius · sm shadow</span></div>
  <div class="row" style="gap: 16px; align-items: flex-start;">
    <div class="biz">
      <div class="img">
        <div class="badges"><span class="badge b-verified">★ Verified</span><span class="badge b-open">● Open</span></div>
        <div class="heart"><svg viewBox="0 0 24 24" fill="none" stroke="var(--fg-1)" stroke-width="2"><path d="M12 21s-7-4.5-9.5-9C.7 8.6 2.5 5 6 5c2 0 3.5 1 4 2.5C10.5 6 12 5 14 5c3.5 0 5.3 3.6 3.5 7-2.5 4.5-5.5 9-5.5 9z"/></svg></div>
      </div>
      <div class="body">
        <div class="name">Café Rumi</div>
        <div class="meta-row"><span class="star">★</span><b style="color:var(--fg-1)">4.7</b><span>(312)</span><span class="sep">·</span><span>Jabal Al-Weibdeh</span><span class="sep">·</span><span>1.2 km</span></div>
      </div>
    </div>
    <div class="biz">
      <div class="img alt">
        <div class="badges"><span class="badge" style="background: rgba(31,26,21,.7); color: var(--gold-300); border:1px solid var(--gold-400);">Luxury</span></div>
        <div class="heart"><svg viewBox="0 0 24 24" fill="var(--accent)" stroke="var(--accent)" stroke-width="2"><path d="M12 21s-7-4.5-9.5-9C.7 8.6 2.5 5 6 5c2 0 3.5 1 4 2.5C10.5 6 12 5 14 5c3.5 0 5.3 3.6 3.5 7-2.5 4.5-5.5 9-5.5 9z"/></svg></div>
      </div>
      <div class="body">
        <div class="name">Royal Time · Watches</div>
        <div class="meta-row"><span class="star">★</span><b style="color:var(--fg-1)">4.9</b><span>(58)</span><span class="sep">·</span><span>Abdali Boulevard</span></div>
      </div>
    </div>
    <div class="biz">
      <div class="img gym">
        <div class="badges"><span class="badge b-verified">★ Verified</span></div>
        <div class="heart"><svg viewBox="0 0 24 24" fill="none" stroke="var(--fg-1)" stroke-width="2"><path d="M12 21s-7-4.5-9.5-9C.7 8.6 2.5 5 6 5c2 0 3.5 1 4 2.5C10.5 6 12 5 14 5c3.5 0 5.3 3.6 3.5 7-2.5 4.5-5.5 9-5.5 9z"/></svg></div>
      </div>
      <div class="body">
        <div class="name">Aerial Fitness Khalda</div>
        <div class="meta-row"><span class="star">★</span><b style="color:var(--fg-1)">4.5</b><span>(187)</span><span class="sep">·</span><span>Khalda</span><span class="sep">·</span><span style="color:var(--pom-500); font-weight:600;">Closed</span></div>
      </div>
    </div>
  </div>
</div>
</body></html>
