<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Aswaq · Mobile UI kit</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    html, body { margin: 0; padding: 0; background: var(--cream-100); font-family: var(--font-body); color: var(--fg-1); min-height: 100vh; }
    .stage { display: grid; place-items: center; min-height: 100vh; padding: 40px 24px; }
    .frame {
      width: 390px; height: 820px;
      max-height: calc(100vh - 80px);
      background: var(--cream-50);
      border-radius: 48px;
      border: 12px solid var(--charcoal-600);
      overflow: hidden;
      box-shadow: 0 40px 80px -20px rgba(31,26,21,0.45), 0 0 0 1px var(--charcoal-700);
      position: relative;
      isolation: isolate;
    }
    .status {
      position: absolute; top: 0; left: 0; right: 0; z-index: 50;
      display: flex; justify-content: space-between; align-items: center;
      padding: 14px 28px 6px;
      font-family: -apple-system, "SF Pro", sans-serif;
      font-weight: 600; font-size: 14px; color: var(--charcoal-600);
      pointer-events: none;
    }
    .status .right { display: flex; gap: 6px; align-items: center; }
    .status .battery { width: 22px; height: 11px; border: 1px solid var(--charcoal-500); border-radius: 3px; padding: 1px; position: relative; }
    .status .battery::after { content: ""; position: absolute; left: 100%; top: 3px; width: 2px; height: 5px; background: var(--charcoal-500); border-radius: 0 2px 2px 0; }
    .status .battery span { display: block; height: 100%; background: var(--charcoal-600); border-radius: 1px; }
    .island {
      position: absolute; top: 8px; left: 50%; transform: translateX(-50%);
      width: 110px; height: 30px; border-radius: 999px;
      background: var(--charcoal-700);
      z-index: 51;
    }
    .home-indicator {
      position: absolute; bottom: 6px; left: 50%; transform: translateX(-50%);
      width: 130px; height: 4px; border-radius: 4px;
      background: var(--charcoal-600);
      z-index: 50;
    }
    .body-app { position: absolute; inset: 36px 0 0 0; overflow: hidden; }
    .caption { color: var(--fg-3); font-size: 12px; margin-top: 14px; font-family: var(--font-mono); text-align: center; }
    .control-bar {
      position: fixed; top: 16px; right: 16px;
      background: var(--charcoal-600); color: var(--cream-100);
      border-radius: 999px; padding: 8px 8px 8px 16px;
      display: flex; align-items: center; gap: 8px;
      box-shadow: var(--shadow-lg); z-index: 100;
      font-size: 12px; font-weight: 600;
    }
    .control-bar select {
      background: var(--charcoal-500); color: var(--cream-50);
      border: 0; padding: 6px 10px; border-radius: 999px;
      font-family: inherit; font-size: 12px; font-weight: 600; cursor: pointer; outline: none;
    }
  </style>
</head>
<body>
  <div class="stage">
    <div>
      <div class="frame">
        <div class="island"></div>
        <div class="status">
          <span>9:41</span>
          <span class="right">
            <svg width="16" height="11" viewBox="0 0 16 11" fill="currentColor"><rect x="0" y="7" width="3" height="4" rx="1"/><rect x="4" y="4" width="3" height="7" rx="1"/><rect x="8" y="2" width="3" height="9" rx="1"/><rect x="12" y="0" width="3" height="11" rx="1"/></svg>
            <svg width="16" height="11" viewBox="0 0 16 12" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M1 5 a10 10 0 0 1 14 0M3.5 7.5 a6.5 6.5 0 0 1 9 0M6 10 a3 3 0 0 1 4 0M8 11.5 a0.5 0.5 0 0 1 0 0"/></svg>
            <span class="battery"><span style="width: 78%;"></span></span>
          </span>
        </div>
        <div class="body-app" id="app-root"></div>
        <div class="home-indicator"></div>
      </div>
      <div class="caption" id="caption">Aswaq mobile · interactive prototype · use the controls top-right</div>
    </div>
  </div>

  <div class="control-bar">
    <span style="opacity: 0.7;">Aswaq</span>
    <select id="lang">
      <option value="en">English · LTR</option>
      <option value="ar">العربية · RTL</option>
    </select>
    <select id="screen">
      <option value="home">Home</option>
      <option value="search">Search</option>
      <option value="business">Business profile</option>
      <option value="compare">Compare (paywall)</option>
      <option value="cart">Cart</option>
      <option value="checkout">Checkout</option>
      <option value="confirmed">Order confirmed</option>
      <option value="orders">My orders</option>
      <option value="saved">Saved</option>
      <option value="you">Account</option>
      <option value="premium">Premium upsell</option>
      <option value="login">Login</option>
      <option value="register">Register</option>
    </select>
  </div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script src="data.js"></script>
  <script type="text/babel" src="components.jsx"></script>
  <script type="text/babel" src="screens-discovery.jsx"></script>
  <script type="text/babel" src="screens-commerce.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>
  <script type="text/babel">
    const root = ReactDOM.createRoot(document.getElementById("app-root"));
    let state = { lang: "en", startScreen: "home" };
    function render() {
      // remount cleanly when the start screen changes
      root.render(<MobileApp key={state.lang + state.startScreen} lang={state.lang} startScreen={state.startScreen} />);
    }
    document.getElementById("lang").addEventListener("change", (e) => { state.lang = e.target.value; render(); });
    document.getElementById("screen").addEventListener("change", (e) => { state.startScreen = e.target.value; render(); });
    render();
  </script>
</body>
</html>
