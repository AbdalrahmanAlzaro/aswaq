<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_preview.css">
<title>Components · inputs</title>
<style>
  .field { display: flex; flex-direction: column; gap: 6px; }
  .field label { font-size: 12px; color: var(--fg-2); font-weight: 600; }
  .input { font-family: var(--font-body); font-size: 15px; padding: 12px 14px; border-radius: 14px; border: 1px solid var(--cream-400); background: #fff; color: var(--fg-1); outline: none; transition: all 140ms; }
  .input::placeholder { color: var(--fg-mute); }
  .input.focus { border-color: var(--accent); box-shadow: var(--shadow-focus); border-width: 2px; padding: 11px 13px; }
  .input.error { border-color: var(--danger); }
  .helper { font-size: 12px; color: var(--fg-3); }
  .helper.err { color: var(--danger); }
  .search { display: flex; align-items: center; gap: 10px; padding: 12px 16px; border-radius: 999px; background: var(--surface); border: 1px solid var(--border); }
  .search input { flex: 1; border: 0; background: transparent; font-size: 15px; outline: none; color: var(--fg-1); font-family: var(--font-body); }
</style>
</head>
<body>
<div class="card tight">
  <div class="spread"><span class="eyebrow">Inputs · text · search</span><span class="mono">14px radius · 1→2px border on focus</span></div>
  <div class="row" style="gap: 14px; align-items: flex-start;">
    <div class="field" style="flex:1;"><label>Shop name</label><input class="input" placeholder="e.g. Habibah Sweets"><span class="helper">As it appears on your storefront</span></div>
    <div class="field" style="flex:1;"><label>Shop name</label><input class="input focus" value="Café Rumi"><span class="helper">As it appears on your storefront</span></div>
    <div class="field" style="flex:1;"><label>Shop name</label><input class="input error" value=""><span class="helper err">Required to publish</span></div>
  </div>
  <div class="search" style="margin-top: 4px;">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--fg-2)" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg>
    <input placeholder="Search businesses, products, neighbourhoods…" />
    <span class="mono" style="background: var(--cream-200); padding: 2px 8px; border-radius: 6px; font-size: 11px;">⌘K</span>
  </div>
</div>
</body></html>
