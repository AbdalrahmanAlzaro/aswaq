<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_preview.css">
<title>Components · stars</title>
<style>
  .stars { position: relative; display: inline-flex; height: 16px; }
  .stars .track, .stars .fill { display: inline-flex; gap: 2px; }
  .stars .track { color: var(--cream-400); }
  .stars .fill { color: var(--gold-400); position: absolute; left: 0; top: 0; overflow: hidden; }
  .stars svg { width: 16px; height: 16px; fill: currentColor; flex: none; }
  .lg .stars, .lg .stars svg { height: 24px; width: 24px; }
  .lg .stars svg { width: 24px; height: 24px; }
  .rating { display: inline-flex; align-items: baseline; gap: 8px; font-family: var(--font-body); }
  .rating .num { font-weight: 700; font-size: 16px; color: var(--fg-1); font-feature-settings: "tnum"; }
  .rating .ct  { font-size: 13px; color: var(--fg-3); }
  .lg .rating .num { font-size: 36px; font-family: var(--font-display); font-weight: 600; letter-spacing: -0.02em; }
</style>
</head>
<body>
<div class="card tight">
  <div class="spread"><span class="eyebrow">Star rating</span><span class="mono">numeric label · clipped fill, never half-stars</span></div>
  <div class="row gap-lg">
    <div class="rating">

      <span class="stars">

        <span class="fill" style="width: 94%;"><svg viewBox="0 0 24 24"><path d="M12 2l3 7h7l-5.5 4 2 8L12 17l-6.5 4 2-8L2 9h7z"/></svg><svg viewBox="0 0 24 24"><path d="M12 2l3 7h7l-5.5 4 2 8L12 17l-6.5 4 2-8L2 9h7z"/></svg><svg viewBox="0 0 24 24"><path d="M12 2l3 7h7l-5.5 4 2 8L12 17l-6.5 4 2-8L2 9h7z"/></svg><svg viewBox="0 0 24 24"><path d="M12 2l3 7h7l-5.5 4 2 8L12 17l-6.5 4 2-8L2 9h7z"/></svg><svg viewBox="0 0 24 24"><path d="M12 2l3 7h7l-5.5 4 2 8L12 17l-6.5 4 2-8L2 9h7z"/></svg></span>
      </span>
      <span class="ct">(312)</span>
