<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_preview.css">
<title>Components · bottom nav & header</title>
<style>
  body { background: var(--bg); }
  .frame { background: var(--cream-50); border-radius: 20px; padding: 0; overflow: hidden; box-shadow: var(--shadow-sm); border: 1px solid var(--border); }
  .header { display: flex; align-items: center; justify-content: space-between; padding: 14px 18px; background: var(--cream-50); border-bottom: 1px solid var(--border); }
  .header img { height: 24px; }
  .lang { display: inline-flex; background: var(--cream-200); padding: 3px; border-radius: 999px; }
  .lang button { background: transparent; border: 0; padding: 5px 12px; border-radius: 999px; font-family: var(--font-body); font-size: 12px; font-weight: 600; color: var(--fg-2); cursor: pointer; }
  .lang button.on { background: var(--charcoal-600); color: var(--cream-50); }
  .nav { display: grid; grid-template-columns: repeat(5,1fr); background: var(--cream-50); border-top: 1px solid var(--border); padding: 8px 0 14px; }
  .nav .item { display: flex; flex-direction: column; align-items: center; gap: 4px; font-family: var(--font-body); font-size: 10.5px; font-weight: 600; color: var(--fg-3); padding: 6px 4px; }
  .nav .item.on { color: var(--accent); }
  .nav .item svg { width: 22px; height: 22px; }
  .nav .item.on svg { stroke-width: 2.4; }
  .dot { width: 8px; height: 8px; background: var(--accent); border-radius: 999px; position: absolute; top: 2px; right: -4px; border: 2px solid var(--cream-50); }
  .iconwrap { position: relative; }
</style>
</head>
<body>
<div class="card tight">
  <div class="spread"><span class="eyebrow">Header + bottom nav</span><span class="mono">5-item · 64px tall · selected = terracotta</span></div>
  <div class="frame">
    <div class="header">
      <img src="../assets/logo/aswaq-mark.svg" alt="">
      <img src="../assets/logo/aswaq-wordmark.svg" alt="Aswaq" style="height: 28px; margin-right: auto; margin-left: 8px;">
      <div class="lang"><button class="on">EN</button><button>ع</button></div>
    </div>
    <div style="height: 90px; display:grid; place-items:center; color: var(--fg-3); font-family: var(--font-mono); font-size: 11px;">— content —</div>
    <div class="nav">
      <div class="item on"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 11l9-8 9 8v10a2 2 0 0 1-2 2h-4v-7h-6v7H5a2 2 0 0 1-2-2z"/></svg><span>Home</span></div>
      <div class="item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg><span>Search</span></div>
      <div class="item"><div class="iconwrap"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 21s-7-4.5-9.5-9C.7 8.6 2.5 5 6 5c2 0 3.5 1 4 2.5C10.5 6 12 5 14 5c3.5 0 5.3 3.6 3.5 7-2.5 4.5-5.5 9-5.5 9z"/></svg></div><span>Saved</span></div>
      <div class="item"><div class="iconwrap"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 6h15l-1.5 9h-12L6 6zM6 6l-1-2H2"/><circle cx="9" cy="20" r="1.5"/><circle cx="18" cy="20" r="1.5"/></svg><span class="dot"></span></div><span>Cart</span></div>
      <div class="item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4.4 3.6-8 8-8s8 3.6 8 8"/></svg><span>You</span></div>
    </div>
  </div>
</div>
</body></html>
