<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_preview.css">
<title>Components · chips & tabs</title>
<style>
  .chip { display: inline-flex; align-items: center; gap: 8px; padding: 9px 16px; border-radius: 999px; background: var(--surface); border: 1px solid var(--border); color: var(--fg-1); font-family: var(--font-body); font-size: 14px; font-weight: 500; cursor: pointer; transition: all 140ms; }
  .chip.selected { background: var(--accent); color: var(--accent-fg); border-color: var(--accent); }
  .chip.ink { background: var(--charcoal-600); color: var(--cream-50); border-color: var(--charcoal-600); }
  .tabs { display: inline-flex; border-bottom: 1px solid var(--border); }
  .tab { padding: 12px 18px; font-family: var(--font-body); font-size: 14px; font-weight: 600; color: var(--fg-2); cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px; }
  .tab.active { color: var(--fg-1); border-bottom-color: var(--accent); }
  .seg { display: inline-flex; background: var(--cream-200); padding: 4px; border-radius: 12px; gap: 4px; }
  .seg button { background: transparent; border: 0; padding: 7px 14px; border-radius: 8px; font-family: var(--font-body); font-size: 13px; font-weight: 600; color: var(--fg-2); cursor: pointer; }
  .seg button.active { background: var(--surface); color: var(--fg-1); box-shadow: var(--shadow-xs); }
</style>
</head>
<body>
<div class="card tight">
  <div class="spread"><span class="eyebrow">Chips · tabs · segmented</span><span class="mono">filter rows · category nav · view toggles</span></div>
  <div class="row" style="gap: 8px;">
    <button class="chip selected">All</button>
    <button class="chip">Cafés</button>
    <button class="chip">Restaurants</button>
    <button class="chip">Gyms</button>
    <button class="chip">Electronics</button>
    <button class="chip">Watches</button>
    <button class="chip">Jewellery</button>
  </div>
  <div class="row" style="gap: 16px; margin-top: 4px;">
    <div class="tabs">
      <div class="tab">About</div>
      <div class="tab active">Menu · 24</div>
      <div class="tab">Reviews · 312</div>
      <div class="tab">Hours</div>
    </div>
    <div class="seg" style="margin-left: auto;">
      <button class="active">List</button>
      <button>Map</button>
    </div>
  </div>
</div>
</body></html>
