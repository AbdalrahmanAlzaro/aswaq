<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_preview.css">
<title>Components · review</title>
<style>
  .rev { background: var(--surface); border-radius: 20px; border: 1px solid var(--border); padding: 18px 20px; font-family: var(--font-body); box-shadow: var(--shadow-xs); }
  .head { display: flex; align-items: center; gap: 12px; }
  .av { width: 36px; height: 36px; border-radius: 999px; background: linear-gradient(135deg, var(--terracotta-300), var(--gold-300)); color: var(--cream-50); font-weight: 700; display: grid; place-items: center; font-size: 14px; }
  .name { font-weight: 700; font-size: 14px; color: var(--fg-1); }
  .when { font-size: 12px; color: var(--fg-3); }
  .stars { color: var(--gold-400); font-size: 13px; }
  .body { font-size: 14px; color: var(--fg-1); line-height: 1.55; margin-top: 10px; }
  .helpful { display: flex; gap: 14px; margin-top: 10px; font-size: 12px; color: var(--fg-3); }
  .helpful button { background: transparent; border: 0; color: var(--fg-2); cursor: pointer; font-size: 12px; font-weight: 600; display: inline-flex; align-items: center; gap: 4px; }
</style>
</head>
<body>
<div class="card tight">
  <div class="spread"><span class="eyebrow">Review card</span><span class="mono">avatar · 5-star track · body · helpful row</span></div>
  <div class="rev">
    <div class="head">
      <div class="av">L</div>
      <div style="flex:1;">
        <div class="name">Lina A.</div>
        <div class="when">2 weeks ago · Verified order</div>
      </div>
      <div class="stars">★★★★★</div>
    </div>
    <div class="body">Cheese kunafa was warm, syrup was light — exactly how I remember it from my grandfather's house in Salt. The seller wrapped it carefully for the drive home.</div>
    <div class="helpful">
      <button><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M7 11v9H4v-9zM7 11l4-7c.5-1 2-1 2.5 0L14 8h5a2 2 0 0 1 2 2.4L20 19a2 2 0 0 1-2 2H7"/></svg>Helpful · 12</button>
      <button>Report</button>
    </div>
  </div>
</div>
</body></html>
