<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_preview.css">
<title>Components · product card</title>
<style>
  .prod { width: 200px; background: var(--surface); border-radius: 20px; border: 1px solid var(--border); box-shadow: var(--shadow-sm); overflow: hidden; font-family: var(--font-body); position: relative; }
  .prod .img { aspect-ratio: 1/1; background: var(--cream-200); position: relative; display: grid; place-items: center; }
  .prod .img.alt1 { background: linear-gradient(135deg, #f5dccf, #ecb9a1); }
  .prod .img.alt2 { background: linear-gradient(135deg, #d8d2c8, #756d63); }
  .prod .img.alt3 { background: linear-gradient(135deg, #f3e3b5, #dcb24f); }
  .prod .heart { position: absolute; top: 10px; right: 10px; width: 30px; height: 30px; background: rgba(253, 251, 246, 0.95); border-radius: 999px; display: grid; place-items: center; box-shadow: var(--shadow-xs); }
  .prod .heart svg { width: 14px; height: 14px; }
  .prod .disc { position: absolute; top: 10px; left: 10px; padding: 3px 8px; border-radius: 999px; background: var(--accent); color: var(--accent-fg); font-size: 11px; font-weight: 700; line-height: 1; }
  .prod .body { padding: 12px 14px 14px; }
  .prod .vendor { font-size: 11px; color: var(--fg-3); font-weight: 500; }
  .prod .name { font-size: 14px; font-weight: 600; color: var(--fg-1); line-height: 1.3; margin-top: 4px; height: 2.6em; overflow: hidden; }
  .prod .price-row { display: flex; align-items: baseline; gap: 6px; margin-top: 8px; }
  .prod .price { font-weight: 700; font-size: 16px; color: var(--fg-1); font-feature-settings: "tnum"; }
  .prod .was { font-size: 12px; color: var(--fg-3); text-decoration: line-through; }
  .prod .cheapest { background: var(--olive-100); color: var(--olive-700); padding: 3px 8px; border-radius: 999px; font-size: 10.5px; font-weight: 700; }
</style>
</head>
<body>
<div class="card tight" style="background: var(--bg);">
  <div class="spread"><span class="eyebrow">Product card</span><span class="mono">square image · tabular price · cheapest badge</span></div>
  <div class="row" style="gap: 14px; align-items: flex-start;">
    <div class="prod">
      <div class="img alt1"><span class="disc">−20%</span><div class="heart"><svg viewBox="0 0 24 24" fill="none" stroke="var(--fg-1)" stroke-width="2"><path d="M12 21s-7-4.5-9.5-9C.7 8.6 2.5 5 6 5c2 0 3.5 1 4 2.5C10.5 6 12 5 14 5c3.5 0 5.3 3.6 3.5 7-2.5 4.5-5.5 9-5.5 9z"/></svg></div></div>
      <div class="body">
        <div class="vendor">Habibah Sweets</div>
        <div class="name">Kunafa nabulsia, 1 kilo</div>
        <div class="price-row"><span class="price">12 JD</span><span class="was">15 JD</span></div>
      </div>
    </div>
    <div class="prod">
      <div class="img alt2"><div class="heart"><svg viewBox="0 0 24 24" fill="var(--accent)" stroke="var(--accent)" stroke-width="2"><path d="M12 21s-7-4.5-9.5-9C.7 8.6 2.5 5 6 5c2 0 3.5 1 4 2.5C10.5 6 12 5 14 5c3.5 0 5.3 3.6 3.5 7-2.5 4.5-5.5 9-5.5 9z"/></svg></div></div>
      <div class="body">
        <div class="vendor">Royal Time</div>
        <div class="name">Seiko Presage Cocktail</div>
        <div class="price-row"><span class="price">485 JD</span></div>
      </div>
    </div>
    <div class="prod">
      <div class="img alt3"><div class="heart"><svg viewBox="0 0 24 24" fill="none" stroke="var(--fg-1)" stroke-width="2"><path d="M12 21s-7-4.5-9.5-9C.7 8.6 2.5 5 6 5c2 0 3.5 1 4 2.5C10.5 6 12 5 14 5c3.5 0 5.3 3.6 3.5 7-2.5 4.5-5.5 9-5.5 9z"/></svg></div></div>
      <div class="body">
        <div class="vendor">Goldsmiths Amman</div>
        <div class="name">Filigree gold ring, 18k</div>
        <div class="price-row"><span class="price">240 JD</span><span class="cheapest">Cheapest</span></div>
      </div>
    </div>
  </div>
</div>
</body></html>
